name: leak-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for BSH markers
        run: |
          set -euo pipefail
          PATTERN='bshg\.com|boschdevcloud|github-bshg|eforms-online|s\.a\.x\.|MasterLayout|rb-proxy|\.bosch\.com|Bosch Siemens|MUM3RE|YeHVV89kL7aKBQbZWT9k93hLA7kfdfg2uRNrYfd22Y|eyJpZGVudGlmaWVyIjo'
          if grep -rEn --binary-files=without-match "$PATTERN" \
            --exclude-dir=.git --exclude='*.svg' --exclude='*.jpg' --exclude='*.pptx' .; then
            echo "::error::Leak scan failed — BSH markers found"
            exit 1
          fi
          if find . -name 'eyJpZGVudGlmaWVyIjo*' -not -path './.git/*' | grep .; then
            echo "::error::Leak scan failed — BSH asset-id binaries committed"
            exit 1
          fi
          echo "✓ No BSH markers found."
